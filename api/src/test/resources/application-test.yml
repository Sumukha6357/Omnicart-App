spring:
  datasource:
    url: jdbc:h2:mem:omnicart_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: true
        format_sql: true
  cache:
    type: none
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
  security:
    jwt:
      secret: test-secret-key-for-jwt-token-generation-12345678901234567890
      expiration: 86400000 # 24 hours
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    com.sumuka.ecommerce_backend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
